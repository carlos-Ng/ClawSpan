syntax = "proto3";

package clawspan.rpc.vm_channel.v1;

service VmChannelService {
  rpc BeginTask(BeginTaskRequest) returns (BeginTaskResponse);
  rpc EndTask(EndTaskRequest) returns (EndTaskResponse);
  rpc CallCapability(CallCapabilityRequest) returns (CallCapabilityResponse);
}

message BeginTaskRequest {
  string session_id = 1;
  string root_description = 2;
  string description = 3;
  string parent_task_id = 4;
}

message BeginTaskResponse {
  string task_id = 1;
}

message EndTaskRequest {
  string task_id = 1;
  bool success = 2;
}

message EndTaskResponse {
  bool success = 1;
}

message CallCapabilityRequest {
  string task_id = 1;
  string capability = 2;
  string operation = 3;
  string params_json = 4;
}

message CallCapabilityResponse {
  bool success = 1;
  string result_json = 2;
  int32 error_code = 3;
  string error_message = 4;
}

