# ClawSpan daemon 配置文件（dist 目录专用）
# 运行方式：cd dist && .\bin\claw_span_service.exe -f -c config\clawspan.toml
#
# 注意：此配置的路径相对于 dist 目录，须在 dist 下启动。

[daemon]
socket_path      = "\\\\.\\pipe\\crew-shell-service"
thread_pool_size = 4
log_level        = "debug"

# 插件 DLL 目录：dist/modules/（相对于 dist/ 工作目录）
module_dir = "modules"

# ── UIService (Channel 2) ────────────────────────────────────────────────────

[ui]
pipe_path    = "\\\\.\\pipe\\crew-shell-service-ui"
timeout_mode = "timeout_deny"
timeout_secs = 60

# ── VsockServer (Channel 3: VM 直连) ───────────────────────────────────────

[vsock]
port    = 100
enabled = true

# ──  (Channel 3 gRPC版: VM 直连) ──────────────────────────────────────────────────

[channel3_grpc]
enabled     = true
host_listen = "127.0.0.1:50051"
vsock_port  = 101

# ── VMM (VM 生命周期管理) ──────────────────────────────────────────────────

[vmm]
distro_name = "ClawSpan"
# rootfs_path: rootfs tarball 路径（首次自动导入用，留空不自动导入）
# rootfs_path = ""
# exe_path: claw_span_vmm.exe 路径（留空时从 daemon 同目录查找）
# exe_path = ""
auto_start  = true

[[modules]]
name = "capability_ax"

[[modules]]
name       = "security_filter"
priority   = 10
rules_file = "config\\security_filter_rules.toml"
