# ClawSpan daemon 配置文件（Windows 版本）
# 运行方式：cd /path/to/ClawSpan && .\build\Debug\claw_span_service.exe -f -c config\clawspan.toml

[daemon]
# IPC Named Pipe 路径（Windows 格式，客户端使用 \\.\pipe\crew-shell-service 连接）
socket_path      = "\\\\.\\pipe\\crew-shell-service"

thread_pool_size = 4
log_level        = "debug"

# DLL 所在目录，claw_span_service 从此目录按 "{name}.dll" 推导路径
# dist 目标已将所有 DLL 集中到此目录
module_dir = "build\\modules"

# ── UIService (Channel 2) ────────────────────────────────────────────────────

[ui]
# ClawSpan WinForms UI 连接的 Named Pipe 路径
pipe_path    = "\\\\.\\pipe\\crew-shell-service-ui"

# 用户无响应时的超时策略：wait_forever / timeout_deny / timeout_allow
timeout_mode = "timeout_deny"

# 超时时长（秒），timeout_mode = wait_forever 时忽略
timeout_secs = 60

# ── VsockServer (Channel 3: VM 直连) ───────────────────────────────────────

[vsock]
port    = 100
enabled = true

# ──  (Channel 3 gRPC版: VM 直连) ──────────────────────────────────────────────────

[channel3_grpc]
enabled     = true
host_listen = "127.0.0.1:50051"
vsock_port  = 101


# ── VMM (VM 生命周期管理) ──────────────────────────────────────────────────

[vmm]
distro_name = "ClawSpan"
auto_start  = false

# ── 能力模块 ─────────────────────────────────────────────────────────────────

[[modules]]
name = "capability_ax"
# 可在此处放置 ax 模块专属参数，例如：
# max_depth = 8

# ── 安全模块 ─────────────────────────────────────────────────────────────────

[[modules]]
name       = "security_filter"
priority   = 10
rules_file = "config\\security_filter_rules.toml"
